server:
  port: 8082

spring:
  application:
    name: payment-account
  datasource:
    url: jdbc:mysql://localhost:3306/payment_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: your_username
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

seata:
  enabled: true
  application-id: payment-account
  tx-service-group: payment_tx_group
  service:
    vgroup-mapping:
      payment_tx_group: default
    grouplist:
      default: 127.0.0.1:8091
  data-source-proxy-mode: AT
  enable-auto-data-source-proxy: false